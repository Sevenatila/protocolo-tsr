<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Quiz de Cuidados Faciais | Descubra Seu Programa Personalizado</title>
    <meta name="description" content="Descubra seu tipo de pele e receba um programa personalizado de exercícios faciais. Resultados visíveis em 4 semanas." />
    <meta property="og:title" content="Quiz de Cuidados Faciais | Programa Personalizado" />
    <meta property="og:description" content="Mais de 2 milhões de mulheres já transformaram sua pele. Faça o quiz e descubra seu programa ideal." />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <style>
      /* Critical CSS - renders immediately before JS loads */
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#111111;color:#fff;font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
      #shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;max-width:28rem;margin:0 auto}
      #shell .hero-img{width:100%;max-height:55vh;object-fit:cover;object-position:top}
      #shell .grad{position:absolute;bottom:0;left:0;right:0;height:6rem;background:linear-gradient(to bottom,transparent,#111111)}
      #shell .badge{position:absolute;top:1rem;left:0;right:0;display:flex;justify-content:center}
      #shell .badge-inner{display:inline-flex;align-items:center;gap:.375rem;border-radius:9999px;padding:.375rem 1rem;background:#0d2219;border:1px solid rgba(82,201,144,.25);font-size:.75rem;font-weight:700;color:#f5b800}
      #shell h1{font-size:1.875rem;font-weight:700;text-align:center;margin-bottom:.75rem;line-height:1.2;padding:0 1.5rem}
      #shell h1 span{color:#52c990}
      #shell p{color:rgba(255,255,255,.55);text-align:center;margin-bottom:1.5rem;padding:0 1.5rem}
      #shell .cta{width:calc(100% - 3rem);height:3.5rem;border-radius:1rem;background:#1e6b4a;color:#fff;font-weight:700;font-size:1.125rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;margin:0 1.5rem}
      #shell .sub{color:rgba(255,255,255,.55);font-size:.75rem;text-align:center;margin-top:.75rem}
      .hidden{display:none}
    </style>
  </head>
  <body>
    <!-- Static shell shown instantly while React loads -->
    <main id="shell">
      <div style="position:relative;width:100%">
        <img src="/images/mimika/welcome-loader-photos-2.webp" alt="Rostos felizes" class="hero-img" width="750" height="820" fetchpriority="high">
        <div class="grad"></div>
        <div class="badge"><div class="badge-inner">⭐ #1 em Definição Facial 4.8</div></div>
      </div>
      <h1>Seu rosto pode parecer <span>10 anos mais jovem</span> em apenas 21 dias</h1>
      <p>O diagnóstico leva 2 minutos. O protocolo personalizado transforma em 21 dias.</p>
      <button class="cta" aria-label="Começar diagnóstico">Fazer meu diagnóstico grátis →</button>
      <p class="sub">Leva apenas 2 minutos • 100% gratuito</p>
    </main>
    <div id="root" class="hidden"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide shell and show React app once mounted
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.getElementById('shell').style.display = 'none';
          root.classList.remove('hidden');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
