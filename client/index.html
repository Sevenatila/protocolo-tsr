<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Quiz de Cuidados Faciais | Descubra Seu Programa Personalizado</title>
    <meta name="description" content="Descubra seu tipo de pele e receba um programa personalizado de exercícios faciais. Resultados visíveis em 4 semanas." />
    <meta property="og:title" content="Quiz de Cuidados Faciais | Programa Personalizado" />
    <meta property="og:description" content="Mais de 2 milhões de mulheres já transformaram sua pele. Faça o quiz e descubra seu programa ideal." />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <style>
      /* Critical CSS - renders immediately before JS loads */
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#111111;color:#fff;font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
      #shell{min-height:100vh;display:flex;align-items:center;justify-content:center;max-width:28rem;margin:0 auto;padding:1.5rem 2rem}
      .shell-container{width:100%}
      #shell h1{font-size:1.875rem;font-weight:900;text-align:center;margin-bottom:1.5rem;line-height:1.2;color:#fff}
      .highlight-neutral{color:rgba(255,255,255,0.8)}
      .highlight-danger{color:#fb7185}
      #shell > div > p:first-of-type{color:rgba(255,255,255,0.8);text-align:center;margin-bottom:2.5rem;font-size:1.125rem;line-height:1.5}
      .call-to-action{color:rgba(255,255,255,0.7);text-align:center;margin-bottom:2rem;font-size:1rem}
      .gender-buttons{display:flex;gap:1rem;width:100%;margin-bottom:1rem}
      .gender-option{flex:1;display:flex;flex-direction:column;align-items:center}
      .gender-card{width:100%;height:10rem;border-radius:1rem;overflow:hidden;border:2px solid rgba(255,255,255,0.15);position:relative;transition:all 0.3s ease}
      .gender-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 20%}
      .gender-label{color:#fff;font-weight:700;font-size:1.125rem;margin-top:0.75rem}
      .subheadline{font-size:1.125rem;color:rgba(255,255,255,0.8);font-weight:600;white-space:nowrap}
      .sub{color:rgba(255,255,255,0.3);font-size:0.75rem;text-align:center;margin-top:1rem}
      .hidden{display:none}
    </style>
  </head>
  <body>
    <!-- Static shell shown instantly while React loads -->
    <main id="shell">
      <div class="shell-container">
        <h1>Por que <span class="highlight-neutral">dormir de lado</span> está <span class="highlight-danger">deformando seu rosto</span><br><span class="subheadline">(e como 3 exercícios simples revertem isso)</span></h1>
        <p>Essa descoberta pode reverter danos faciais em 90 segundos por dia.</p>
        <p class="call-to-action">Qual seu gênero?</p>
        <div class="gender-buttons">
          <div class="gender-option">
            <div class="gender-card">
              <img src="/images/mulher-novo.webp" alt="Feminino" class="gender-img">
            </div>
            <p class="gender-label">Feminino</p>
          </div>
          <div class="gender-option">
            <div class="gender-card">
              <img src="/images/homem-novo.webp" alt="Masculino" class="gender-img">
            </div>
            <p class="gender-label">Masculino</p>
          </div>
        </div>
        <p class="sub">Teste gratuito • 90 segundos • Sem cadastro</p>
      </div>
    </main>
    <div id="root" class="hidden"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide shell and show React app once mounted
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.getElementById('shell').style.display = 'none';
          root.classList.remove('hidden');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>
    <script>
      window.pixelId = "69b83477eb660d7c78ad1280";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
  </body>
</html>
